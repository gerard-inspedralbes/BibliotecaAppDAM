services:
  mariadb:
    image: mariadb:latest
    container_name: mariadb_server
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: 1234
      MARIADB_DATABASE: biblioteca
      MARIADB_USER: admin
      MARIADB_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - xarxa_bd

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pma_interficie
    restart: always
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb_server
      PMA_ARBITRARY: 1
    ports:
      - "8080:80"
    networks:
      - xarxa_bd

networks:
  xarxa_bd:
    driver: bridge

volumes:
  db_data: